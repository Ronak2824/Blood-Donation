<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Blood Donation Registration</title>
  <style>
    :root {
      --primary-color: #d9534f;
      --primary-dark: #c9302c;
      --text-color: #222;
      --light-bg: rgba(255, 255, 255, 0.8);
      --blur-bg: rgba(255, 255, 255, 0.15);
      --border-color: rgba(255, 255, 255, 0.3);
    }
  
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      background-image: url('https://images.unsplash.com/photo-1615461066841-0705cba7cf6b?auto=format&fit=crop&w=2070&q=80');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      min-height: 100vh;
      color: var(--text-color);
      backdrop-filter: blur(5px);
    }
  
    .logo-container {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid white;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }
  
    .logo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }
  
    .logo:hover {
      transform: scale(1.1);
    }
  
    h1 {
      text-align: center;
      color: var(--primary-color);
      margin-top: 40px;
      font-size: 2.8rem;
      text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.2);
    }
  
    h3 {
      color: var(--primary-color);
      margin-top: 30px;
      border-bottom: 2px solid var(--primary-color);
      padding-bottom: 10px;
    }
  
    form {
      max-width: 850px;
      margin: 30px auto;
      padding: 35px;
      background: var(--blur-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
    }
  
    .form-group {
      margin-bottom: 20px;
    }
  
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--text-color);
    }
  
    input[type="text"],
    input[type="email"],
    input[type="tel"],
    input[type="number"],
    input[type="date"],
    select,
    textarea {
      width: 100%;
      padding: 14px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 16px;
      transition: all 0.3s ease;
      background-color: rgba(255, 255, 255, 0.95);
    }
  
    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="tel"]:focus,
    input[type="number"]:focus,
    input[type="date"]:focus,
    select:focus,
    textarea:focus {
      border-color: var(--primary-color);
      outline: none;
      box-shadow: 0 0 10px rgba(217, 83, 79, 0.3);
    }
  
    .name-group {
      display: flex;
      gap: 15px;
    }
  
    .name-group input {
      flex: 1;
    }
  
    .checkbox-group {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
      margin: 15px 0;
    }
  
    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
  
    button {
      display: block;
      width: 100%;
      padding: 16px;
      background: linear-gradient(to right, #d9534f, #c9302c);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 30px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.25);
    }
  
    button:hover {
      background: linear-gradient(to right, #c9302c, #b52b27);
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }
  
    @media (max-width: 768px) {
      form {
        margin: 10px;
        padding: 20px;
      }
  
      .name-group {
        flex-direction: column;
        gap: 0;
      }
  
      h1 {
        font-size: 2rem;
      }
    }
  </style>
  
</head>
<body>
  <div class="logo-container">
    <a href="NEW HOME.html">
      <img src="logo.png" alt="BloodBridge Logo" class="logo" />
    </a>
  </div>  

  <h1>Blood Donation Registration</h1>

  <form id="registrationForm" action="/" method="POST">
    <input type="text" id="FirstName" name="firstName" placeholder="First Name" required />
    <input type="text" id="MiddleName" name="middleName" placeholder="Middle Name" />
    <input type="text" id="LastName" name="lastName" placeholder="Last Name" required />
    <input type="date" id="DOB" name="dob" required />
    <input type="number" id="Age" name="age" placeholder="Age" required />

    <select id="Gender" name="gender" required>
      <option value="">Select Gender</option>
      <option value="Male">Male</option>
      <option value="Female">Female</option>
      <option value="Transgender">Transgender</option>
    </select>

    <select id="BloodGroup" name="bloodGroup" required>
      <option value="">Select Blood Group</option>
      <option value="A+">A+</option>
      <option value="A-">A-</option>
      <option value="B+">B+</option>
      <option value="B-">B-</option>
      <option value="AB+">AB+</option>
      <option value="AB-">AB-</option>
      <option value="O+">O+</option>
      <option value="O-">O-</option>
    </select>

    <input type="number" id="Haemoglobin" name="haemoglobin" placeholder="Haemoglobin Level (g/dL)" required />
    <input type="number" id="Weight" name="weight" placeholder="Weight (kg)" required />

    <input type="email" id="Email" name="email" placeholder="Email" required />
    <input type="tel" id="Mobile" name="mobile" placeholder="Mobile Number" required />
    <input type="tel" id="Phone" name="phone" placeholder="Phone Number (Optional)" />

    <input type="text" id="Address" name="address" placeholder="Address" required />
    <input type="text" id="City" name="city" placeholder="City" required />
    <input type="text" id="State" name="state" placeholder="State" required />
    <input type="text" id="PinCode" name="pinCode" placeholder="Pin Code" required />

    <input type="text" id="EmergencyName" name="emergencyName" placeholder="Emergency Contact Name" required />
    <input type="tel" id="EmergencyNumber" name="emergencyNumber" placeholder="Emergency Contact Number" required />

    <select id="PreviousDonation" name="previousDonation" required>
      <option value="">Have you donated before?</option>
      <option value="Yes">Yes</option>
      <option value="No">No</option>
    </select>

    <select id="Medication" name="medication" required>
      <option value="">Currently on any medication?</option>
      <option value="Yes">Yes</option>
      <option value="No">No</option>
    </select>

    <select id="Illness" name="illness" required>
      <option value="">Suffering from any illness?</option>
      <option value="Yes">Yes</option>
      <option value="No">No</option>
    </select>

    <label><input type="checkbox" id="weightLoss" name="weightLoss" /> Unexplained weight loss</label>
    <label><input type="checkbox" id="diarrhea" name="diarrhea" /> Persistent diarrhea</label>
    <label><input type="checkbox" id="swollenGlands" name="swollenGlands" /> Swollen glands</label>
    <label><input type="checkbox" id="fever" name="fever" /> Fever</label>
    <label><input type="checkbox" id="tattoo" name="tattoo" /> Tattoo in the last 6 months</label>

    <button type="submit">Submit Registration</button>
  </form>

  <script>
    document.getElementById("registrationForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const data = {
        firstName: document.getElementById("FirstName").value,
        middleName: document.getElementById("MiddleName").value,
        lastName: document.getElementById("LastName").value,
        dob: document.getElementById("DOB").value,
        age: document.getElementById("Age").value,
        gender: document.getElementById("Gender").value,
        bloodGroup: document.getElementById("BloodGroup").value,
        haemoglobin: document.getElementById("Haemoglobin").value,
        weight: document.getElementById("Weight").value,
        email: document.getElementById("Email").value,
        mobile: document.getElementById("Mobile").value,
        phone: document.getElementById("Phone")?.value || "",
        address: document.getElementById("Address").value,
        city: document.getElementById("City").value,
        state: document.getElementById("State").value,
        pinCode: document.getElementById("PinCode").value,
        emergencyName: document.getElementById("EmergencyName").value,
        emergencyNumber: document.getElementById("EmergencyNumber").value,
        previousDonation: document.getElementById("PreviousDonation").value,
        medication: document.getElementById("Medication").value,
        illness: document.getElementById("Illness").value,
        weightLoss: document.getElementById("weightLoss").checked,
        diarrhea: document.getElementById("diarrhea").checked,
        swollenGlands: document.getElementById("swollenGlands").checked,
        fever: document.getElementById("fever").checked,
        tattoo: document.getElementById("tattoo").checked
      };

      try {
        const response = await fetch("http://localhost:3000/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });

        const result = await response.text();
        alert(result);
      } catch (error) {
        console.error("Error:", error);
        alert("Failed to submit. Please try again.");
      }
    });
  </script>
</body>
</html>
