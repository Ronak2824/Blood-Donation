<!DOCTYPE html>
<html lang="en" ng-app="volunteerApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Event Registration</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #C62828;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative; /* Added for positioning the logo */
        }

        .container {
            width: 50%;
            background: #FFFFFF;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.2);
        }

        h2 {
            color: #B71C1C;
            margin-bottom: 10px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }

        label {
            font-weight: bold;
            color: #B71C1C;
            display: block;
            margin-bottom: 5px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        .error {
            color: red;
            font-size: 12px;
            margin-top: 5px;
            display: block;
        }

        button {
            background-color: #B71C1C;
            color: white;
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #880E0E;
        }

        button:disabled {
            background-color: gray;
            cursor: not-allowed;
        }

        .logo-container {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .logo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body ng-controller="VolunteerController">

    <div class="logo-container">
        <a href="NEW HOME.html">
            <img src="logo.png" alt="Logo" class="logo">
        </a>
    </div>

    <div class="container">
        <h2>Volunteer Registration</h2>

        <form name="volunteerForm" ng-submit="submitForm()" novalidate>

            <div class="form-group">
                <label>Full Name:</label>
                <input type="text" name="fullName" ng-model="user.fullName" required>
                <span class="error" ng-show="volunteerForm.fullName.$touched && volunteerForm.fullName.$error.required">
                    Full Name is required.
                </span>
            </div>

            <div class="form-group">
                <label>Email Address:</label>
                <input type="email" name="email" ng-model="user.email" required>
                <span class="error" ng-show="volunteerForm.email.$touched && volunteerForm.email.$error.required">
                    Email is required.
                </span>
                <span class="error" ng-show="volunteerForm.email.$touched && volunteerForm.email.$error.email">
                    Invalid email format.
                </span>
            </div>

            <div class="form-group">
                <label>Phone Number:</label>
                <input type="tel" name="phone" ng-model="user.phone" ng-pattern="/^\d{10}$/" required>
                <span class="error" ng-show="volunteerForm.phone.$touched && volunteerForm.phone.$error.required">
                    Phone Number is required.
                </span>
                <span class="error" ng-show="volunteerForm.phone.$touched && volunteerForm.phone.$error.pattern">
                    Must be a 10-digit number.
                </span>
            </div>

            <div class="form-group">
                <label>Availability (Select all that apply):</label>
                <select name="availability" ng-model="user.availability" required>
                    <option value="">Select availability</option>
                    <option value="Weekdays">Weekdays</option>
                    <option value="Weekends">Weekends</option>
                    <option value="Flexible">Flexible</option>
                </select>
                <span class="error" ng-show="volunteerForm.availability.$touched && volunteerForm.availability.$error.required">
                    Please select your availability.
                </span>
            </div>

            <div class="form-group">
                <label>Volunteer Role Preference:</label>
                <select name="role" ng-model="user.role" required>
                    <option value="">Select role preference</option>
                    <option value="Event Coordinator">Event Coordinator</option>
                    <option value="Fundraiser">Fundraiser</option>
                    <option value="Medical Support">Medical Support</option>
                    <option value="General Helper">General Helper</option>
                </select>
                <span class="error" ng-show="volunteerForm.role.$touched && volunteerForm.role.$error.required">
                    Please select a role.
                </span>
            </div>

            <button type="submit" ng-disabled="volunteerForm.$invalid">Sign up now</button>
        </form>
    </div>

    <script>
        var app = angular.module('volunteerApp', []);
        app.controller('VolunteerController', function($scope) {
            $scope.user = {};

            $scope.submitForm = function() {
                if ($scope.volunteerForm.$valid) {
                    alert("Registration Successful! Thank you for volunteering.");
                }
            };
        });
    </script>

</body>
</html>
