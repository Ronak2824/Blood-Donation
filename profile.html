<!DOCTYPE html>
<html lang="en" ng-app="bloodBridge">
<head>
    <title>User Profile - Blood Donation</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <style>
        :root {
            --primary-color: #d9534f;
            --primary-dark: #c9302c;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            text-align: center;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .logo-container {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .logo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.1);
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        .nav-buttons a {
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            background-color: white;
            color: var(--primary-color);
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .nav-buttons a:hover {
            background-color: var(--primary-color);
            color: white;
            transform: translateY(-2px);
        }

        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
        }

        .profile-card {
            padding: 20px;
            background-color: white;
            margin: 20px 0;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            display: inline-block;
            width: 100%;
            max-width: 800px;
        }

        .profile-card h2 {
            color: var(--primary-color);
        }

        .profile-info {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            font-size: 18px;
            flex-wrap: wrap;
        }

        .profile-info div {
            background-color: var(--primary-color);
            color: white;
            padding: 20px;
            border-radius: 5px;
            width: 30%;
            min-width: 200px;
            margin: 10px;
            transition: all 0.3s ease;
        }

        .profile-info div:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .profile-info h3 {
            font-size: 24px;
        }

        .eligibility-status {
            margin: 20px 0;
            padding: 20px;
            font-size: 24px;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .eligible {
            background-color: var(--success-color);
            color: white;
        }

        .not-eligible {
            background-color: var(--danger-color);
            color: white;
        }

        .progress-bar {
            width: 100%;
            background-color: #ddd;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
            height: 20px;
        }

        .progress-bar div {
            height: 100%;
            background-color: var(--success-color);
            text-align: center;
            color: white;
            line-height: 20px;
            transition: width 0.5s ease;
        }

        .footer {
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }

        @media (max-width: 768px) {
            .profile-info {
                flex-direction: column;
                align-items: center;
            }

            .profile-info div {
                width: 80%;
            }

            .nav-buttons {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body ng-controller="ProfileController">
    <header>
        <div class="logo-container">
            <a href="NEW HOME.html">
                <img src="logo.png" alt="BloodBridge Logo" class="logo">
            </a>
        </div>
        <h1>Welcome to Your Profile</h1>
        <div class="nav-buttons">
            <a href="home.html">Home</a>
            <a href="contact.html">Contact Us</a>
            <a href="logout.html">Logout</a>
        </div>
    </header>

    <div class="container">
        <div class="profile-card">
            <h2>Profile Details</h2>
            <div class="profile-info">
                <div>
                    <h3>Donations Made</h3>
                    <p>{{donationsCount}} Donations</p>
                </div>
                <div>
                    <h3>Last Donation</h3>
                    <p>{{lastDonation}}</p>
                </div>
                <div>
                    <h3>Next Eligible Date</h3>
                    <p>{{nextEligibleDate}}</p>
                </div>
            </div>
            <div class="eligibility-status" ng-class="{'eligible': isEligible, 'not-eligible': !isEligible}">
                {{eligibilityMessage}}
            </div>
            <div class="progress-bar">
                <div ng-style="{'width': progressPercentage + '%'}">{{progressPercentage}}%</div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2025 Blood Donation Organization. All rights reserved.</p>
    </footer>

    <script>
        angular.module('bloodBridge', [])
            .controller('ProfileController', ['$scope', function($scope) {
                // Static profile data
                $scope.donationsCount = 5;
                $scope.lastDonation = '1 Month Ago';
                $scope.lastDonationDaysAgo = 30;
                $scope.requiredWaitDays = 60;

                // Calculate eligibility
                $scope.calculateEligibility = function() {
                    $scope.daysUntilNextDonation = $scope.requiredWaitDays - $scope.lastDonationDaysAgo;
                    
                    // Calculate next eligible date
                    let nextDate = new Date();
                    nextDate.setDate(nextDate.getDate() + $scope.daysUntilNextDonation);
                    $scope.nextEligibleDate = nextDate.toDateString();

                    // Calculate progress percentage
                    $scope.progressPercentage = Math.min(($scope.lastDonationDaysAgo / $scope.requiredWaitDays) * 100, 100);

                    // Set eligibility status
                    $scope.isEligible = $scope.daysUntilNextDonation <= 0;
                    $scope.eligibilityMessage = $scope.isEligible 
                        ? 'You are eligible to donate! Find a center near you.'
                        : 'Not eligible to donate yet. Please wait ' + $scope.daysUntilNextDonation + ' more days.';
                };

                // Initialize calculations
                $scope.calculateEligibility();
            }]);
    </script>
</body>
</html>
